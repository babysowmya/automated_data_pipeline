version: "3.8"

services:
  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3

  etl:
    build: ./etl
    depends_on:
      - localstack
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
      BUCKET_NAME: demo-data-bucket