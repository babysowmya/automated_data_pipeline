name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack
        ports:
          - 4566:4566
        env:
          SERVICES: s3

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566
      BUCKET_NAME: demo-data-bucket

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform

      - name: Install AWS CLI
        run: sudo apt-get update && sudo apt-get install -y awscli

      - name: Upload Sample CSV
        run: |
          echo "id,value
          1,5
          2,15
          3,25" > input.csv
          aws --endpoint-url=$AWS_ENDPOINT_URL s3 cp input.csv s3://$BUCKET_NAME/raw/input.csv

      - name: Build Docker Image
        run: docker build -t etl ./etl

      - name: Run ETL Container
        run: |
          docker run --network host \
          -e AWS_ENDPOINT_URL=$AWS_ENDPOINT_URL \
          -e BUCKET_NAME=$BUCKET_NAME \
          etl

      - name: Verify Output
        run: aws --endpoint-url=$AWS_ENDPOINT_URL s3 ls s3://$BUCKET_NAME/processed/